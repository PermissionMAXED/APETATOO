<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APETATO</title>
    <style>
      /* Minimal reset: full-viewport, no scroll, no default margins. */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0e12;
      }
      canvas {
        display: block;
      }
      /* Layer stack: 3D game canvas at the bottom, 2D FX overlay in the
         middle (never eats input), DOM UI on top. */
      #game-canvas,
      #fx-canvas,
      #ui-root {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }
      #game-canvas {
        z-index: 0;
      }
      #fx-canvas {
        z-index: 1;
        pointer-events: none;
      }
      #ui-root {
        z-index: 2;
        /* The root itself is transparent to clicks so the game canvas gets
           mouse aim; individual UI panels opt back in. */
        pointer-events: none;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        user-select: none;
        color: #f5e9c8;
      }
      #ui-root > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <canvas id="fx-canvas"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
